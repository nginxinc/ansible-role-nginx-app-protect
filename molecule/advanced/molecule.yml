---
dependency:
  name: galaxy
  options:
    role-file: molecule/advanced/requirements.yml
driver:
  name: docker
platforms:
  - name: test-workload
    image: nginxdemos/hello
    platform: x86_64
    privileged: true
    groups:
      - workload
    networks:
      - name: molecule-test
  - name: ubuntu-jammy
    image: ubuntu:jammy
    platform: x86_64
    dockerfile: ../common/Dockerfile.j2
    privileged: true
    cgroupns_mode: host
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
    command: /sbin/init
    groups:
      - nap
    networks:
      - name: molecule-test
provisioner:
  name: ansible
  config_options:
    defaults:
      no_target_syslog: true
      remote_tmp: /tmp/.ansible/tmp
  log: false
  env:
    ANSIBLE_ROLES_PATH: ~/.cache/molecule/ansible-role-nginx/${MOLECULE_SCENARIO_NAME}/roles:${MOLECULE_PROJECT_DIRECTORY}/..:~/.ansible/roles:/usr/share/ansible/roles:/etc/ansible/roles
  playbooks:
    prepare: prepare.yml
    converge: converge.yml
    verify: verify.yml
